<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Iron Man: Sky Assault</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: #0a0a14;
            overflow: hidden;
        }
        canvas { display: block; }
        #orientation-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(10, 10, 20, 0.92);
            color: #ffab00;
            font-family: monospace;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 12px;
            z-index: 9999;
            text-align: center;
        }
        #orientation-overlay.visible { display: flex; }
        #orientation-overlay .rotate-hint {
            font-size: 48px;
            animation: rock 1.6s ease-in-out infinite;
        }
        @keyframes rock {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(90deg); }
        }
    </style>
    <script src="lib/phaser.min.js"></script>
</head>
<body>
<div id="game-container"></div>
<div id="orientation-overlay">
    <div class="rotate-hint">&#x21bb;</div>
    <div style="font-size: 20px; font-weight: bold;">ПОВЕРНИТЕ УСТРОЙСТВО</div>
    <div style="font-size: 14px; opacity: 0.7;">Игра работает в ландшафтном режиме</div>
</div>

<!-- ============================================================
     Orientation tracker — detects portrait mode, warns the player
     ============================================================ -->
<script>
(function () {
    const overlay = document.getElementById('orientation-overlay');

    function reportOrientation(label) {
        const w = window.innerWidth;
        const h = window.innerHeight;
        const portrait = h > w;
        console.log('[orient] ' + label + ' — ' + w + 'x' + h + (portrait ? ' PORTRAIT' : ' landscape'));
        overlay.classList.toggle('visible', portrait);
    }

    // initial report after game boots
    window.addEventListener('load', () => {
        if (window.game && window.game.events) {
            window.game.events.on('boot', () => reportOrientation('boot'));
        }
        reportOrientation('load');
    });

    window.addEventListener('resize', function onResize() {
        clearTimeout(onResize.t);
        onResize.t = setTimeout(() => reportOrientation('resize'), 150);
    });

    // mobile orientation change fires before resize sometimes
    if (screen.orientation && screen.orientation.type) {
        screen.orientation.addEventListener('change', () => reportOrientation('orientationchange'));
    }
    window.addEventListener('orientationchange', () => {
        setTimeout(() => reportOrientation('orientationchange'), 300);
    });
})();
</script>

<!-- ============================================================
     Game entry — ES module, loads all scenes
     ============================================================ -->
<script type="module" src="src/main.js"></script>
</body>
</html>
